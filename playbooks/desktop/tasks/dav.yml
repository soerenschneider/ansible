---
- name: Create contacts
  ansible.builtin.file:
    path: "/home/{{ user }}/.contacts"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0700
  tags: dav

- name: Create calendars
  ansible.builtin.file:
    path: "/home/{{ user }}/.calendars"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: 0700
  tags: dav
