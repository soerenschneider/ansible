---
- name: "Check if repo is already checked out"
  ansible.builtin.stat:
    path: "{{ item.dest }}"
  register: _local_repo
  become: false
  changed_when: false
  tags: repos

- name: "Check if repo has local changes"
  ansible.builtin.command: "git status --porcelain"  # noqa: command-instead-of-module
  when: _local_repo.stat.exists
  register: _repo_status
  changed_when: false
  become: false
  args:
    chdir: "{{ item.dest }}"
  tags: repos

- name: "Clone/checkout repo"
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ item.dest }}"
  # noqa: latest[git]
  become: false
  failed_when:
    - item.fail_on_dirty | default(true)
    - _repo_status.stdout | default("") | length > 0
  tags: repos
